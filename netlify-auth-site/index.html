<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARVIO Account</title>
  <link rel="icon" href="/assets/arvio-icon-512.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #0a0806;
      --bg-2: #15110c;
      --card: rgba(20, 16, 12, 0.55);
      --line: rgba(255, 245, 230, 0.08);
      --line-strong: rgba(255, 245, 230, 0.18);
      --text: #f5efe5;
      --muted: #a59c8e;
      --accent-1: #0df0c2;
      --accent-2: #67b7ff;
      --field: rgba(255, 245, 230, 0.04);
      --field-focus: rgba(255, 245, 230, 0.07);
      --ok: #6ee7a3;
      --danger: #ff8a76;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, var(--bg-1), var(--bg-2) 60%, #0a0806);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Animated nebula clouds — three drifting layers */
    .nebula {
      position: fixed;
      inset: -20%;
      pointer-events: none;
      z-index: 0;
      filter: blur(60px);
      will-change: transform, opacity;
    }
    .nebula.one {
      background:
        radial-gradient(35% 40% at 20% 30%, rgba(13,240,194,0.30), transparent 65%),
        radial-gradient(30% 35% at 75% 65%, rgba(103,183,255,0.28), transparent 65%);
      animation: drift-a 28s ease-in-out infinite alternate;
    }
    .nebula.two {
      background:
        radial-gradient(40% 45% at 80% 20%, rgba(103,183,255,0.22), transparent 60%),
        radial-gradient(28% 32% at 25% 80%, rgba(117,255,93,0.16), transparent 65%);
      animation: drift-b 36s ease-in-out infinite alternate;
      mix-blend-mode: screen;
      opacity: 0.8;
    }
    .nebula.three {
      background:
        radial-gradient(25% 30% at 50% 50%, rgba(110,231,163,0.10), transparent 70%),
        radial-gradient(40% 40% at 15% 50%, rgba(13,240,194,0.12), transparent 65%);
      animation: drift-c 44s linear infinite;
      mix-blend-mode: screen;
      opacity: 0.6;
    }
    @keyframes drift-a {
      0%   { transform: translate3d(-4%, -2%, 0) rotate(0deg) scale(1); }
      50%  { transform: translate3d(3%, 4%, 0) rotate(8deg) scale(1.1); }
      100% { transform: translate3d(5%, -3%, 0) rotate(-6deg) scale(1.05); }
    }
    @keyframes drift-b {
      0%   { transform: translate3d(3%, 2%, 0) rotate(0deg) scale(1.05); }
      50%  { transform: translate3d(-4%, -3%, 0) rotate(-10deg) scale(1.15); }
      100% { transform: translate3d(-2%, 4%, 0) rotate(7deg) scale(1); }
    }
    @keyframes drift-c {
      from { transform: rotate(0deg) scale(1.1); }
      to   { transform: rotate(360deg) scale(1.1); }
    }

    /* Star canvas — full viewport, above nebulas */
    #stars {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .shell {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 460px;
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      border: 1px solid var(--line);
      box-shadow:
        0 1px 0 rgba(255,245,230,0.06) inset,
        0 30px 80px -20px rgba(0,0,0,0.7),
        0 8px 30px -8px rgba(0,0,0,0.5);
      overflow: hidden;
      animation: rise 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .head {
      padding: 28px 28px 22px;
      border-bottom: 1px solid var(--line);
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .brand-mark {
      width: 44px;
      height: 32px;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 0 14px rgba(13, 240, 194, 0.24));
    }
    .brand-logo {
      width: 132px;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 14px rgba(13, 240, 194, 0.22));
    }
    .brand-word {
      font-weight: 800;
      letter-spacing: 0.18em;
      font-size: 12px;
      color: rgba(245, 239, 229, 0.82);
    }

    .title {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: #fbf6ec;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .body { padding: 22px 28px 26px; }

    .pair {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(212,165,116,0.35);
      background: linear-gradient(135deg, rgba(212,165,116,0.14), rgba(124,92,255,0.12));
      color: var(--text);
      font-size: 13px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .pair-label { color: var(--muted); font-weight: 500; }
    .pair b { font-family: ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: 0.12em; font-size: 14px; color: #fbf6ec; }

    .status {
      min-height: 18px;
      margin: 2px 0 8px;
      font-size: 13px;
      color: var(--muted);
      transition: color 0.2s ease;
    }
    .status.error { color: var(--danger); }
    .status.ok    { color: var(--ok); }

    .label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin: 14px 0 6px;
      letter-spacing: 0.02em;
    }

    .input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      outline: none;
      background: var(--field);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }
    .input::placeholder { color: #6e6557; }
    .input:hover { border-color: var(--line-strong); }
    .input:focus {
      border-color: rgba(124,92,255,0.6);
      background: var(--field-focus);
      box-shadow: 0 0 0 4px rgba(124,92,255,0.15);
    }

    .actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      width: 100%;
      border: 1px solid var(--line-strong);
      background: rgba(255,245,230,0.03);
      color: var(--text);
      border-radius: 12px;
      padding: 13px;
      font-weight: 600;
      font-family: inherit;
      font-size: 14px;
      letter-spacing: -0.005em;
      cursor: pointer;
      transition: transform .14s ease, background .2s ease, box-shadow .2s ease, border-color .2s ease;
    }
    .btn:hover { background: rgba(255,245,230,0.07); border-color: rgba(255,245,230,0.28); }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .btn.primary {
      position: relative;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      background-size: 200% 200%;
      color: #1a1510;
      border: 0;
      box-shadow: 0 12px 30px -10px rgba(124,92,255,0.6), 0 4px 14px -4px rgba(212,165,116,0.55);
      animation: shift 8s ease-in-out infinite;
    }
    .btn.primary:hover { box-shadow: 0 16px 36px -10px rgba(124,92,255,0.7), 0 6px 18px -4px rgba(212,165,116,0.6); }

    @keyframes shift {
      0%, 100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .small {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.55;
      text-align: center;
    }

    .linkrow {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .linkbtn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 2px;
      transition: color 0.18s ease;
    }
    .linkbtn:hover { color: var(--text); }
    .linkbtn:disabled { opacity: 0.55; cursor: not-allowed; }

    .foot {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .head { padding: 24px 22px 18px; }
      .body { padding: 18px 22px 22px; }
      .title { font-size: 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn.primary, .shell { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="nebula one" aria-hidden="true"></div>

  <div class="nebula three" aria-hidden="true"></div>

  <main class="shell">

  <!-- Starfield + shooting-stars -->
  <script>
    (function () {
      const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const canvas = document.getElementById('stars');
      const ctx = canvas.getContext('2d');
      let w = 0, h = 0, dpr = 1;
      let stars = [];
      let shootingStars = [];
      let lastShoot = 0;
      let nextShootDelay = 900 + Math.random() * 1800;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        seedStars();
      }

      function seedStars() {
        const density = 0.00022; // stars per px²
        const count = Math.max(120, Math.min(420, Math.floor(w * h * density)));
        stars = new Array(count).fill(0).map(() => {
          // 3 parallax layers — back is dim/slow, front is bright/fast
          const layerR = Math.random();
          let depth, sizeMul, alphaMul, speed;
          if (layerR < 0.55) { depth = 0; sizeMul = 0.7; alphaMul = 0.7; speed = 0.12; }
          else if (layerR < 0.88) { depth = 1; sizeMul = 1.0; alphaMul = 0.9; speed = 0.30; }
          else { depth = 2; sizeMul = 1.5; alphaMul = 1.1; speed = 0.65; }

          // Mostly horizontal flow with slight vertical wobble — feels like a slow drift
          const angle = Math.PI + (Math.random() - 0.5) * 0.6; // mostly leftward
          return {
            x: Math.random() * w,
            y: Math.random() * h,
            r: (Math.random() * 1.0 + 0.3) * sizeMul,
            baseA: (0.35 + Math.random() * 0.55) * alphaMul,
            twinkleSpeed: 0.5 + Math.random() * 2.0,
            twinklePhase: Math.random() * Math.PI * 2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            depth,
            tint: Math.random() < 0.20
              ? (Math.random() < 0.5 ? '13,240,194' : '103,183,255')
              : '255,245,230'
          };
        });
      }

      function spawnShootingStar() {
        // Diagonal: top-right to bottom-left, with some variety
        const fromTop = Math.random() < 0.7;
        const startX = fromTop ? Math.random() * w * 0.9 + w * 0.05 : w + 20;
        const startY = fromTop ? -20 : Math.random() * h * 0.4;
        const angle = (Math.PI / 4) + (Math.random() * 0.25 - 0.125); // ~45° down-left
        const speed = 9 + Math.random() * 6;
        shootingStars.push({
          x: startX,
          y: startY,
          vx: -Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0,
          maxLife: 70 + Math.random() * 40,
          length: 120 + Math.random() * 120
        });
      }

      function tick(ts) {
        ctx.clearRect(0, 0, w, h);

        // Twinkling stars
        const t = ts / 1000;
        for (let i = 0; i < stars.length; i++) {
          const s = stars[i];
          s.x += s.vx;
          s.y += s.vy;
          if (s.x < -2) s.x = w + 2; else if (s.x > w + 2) s.x = -2;
          if (s.y < -2) s.y = h + 2; else if (s.y > h + 2) s.y = -2;

          const a = s.baseA * (0.55 + 0.45 * Math.sin(t * s.twinkleSpeed + s.twinklePhase));
          ctx.beginPath();
          ctx.fillStyle = `rgba(${s.tint}, ${a})`;
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        }

        // Shooting stars
        if (!reduce) {
          if (ts - lastShoot > nextShootDelay) {
            spawnShootingStar();
            // Sometimes a quick double for visual interest
            if (Math.random() < 0.25) setTimeout(spawnShootingStar, 220 + Math.random() * 320);
            lastShoot = ts;
            nextShootDelay = 1100 + Math.random() * 2600;
          }
          for (let i = shootingStars.length - 1; i >= 0; i--) {
            const s = shootingStars[i];
            s.x += s.vx;
            s.y += s.vy;
            s.life++;

            const fade = Math.max(0, 1 - s.life / s.maxLife);
            const tx = s.x - s.vx * (s.length / Math.hypot(s.vx, s.vy));
            const ty = s.y - s.vy * (s.length / Math.hypot(s.vx, s.vy));

            const grad = ctx.createLinearGradient(s.x, s.y, tx, ty);
            grad.addColorStop(0, `rgba(255,245,230,${0.95 * fade})`);
            grad.addColorStop(0.4, `rgba(13,240,194,${0.55 * fade})`);
            grad.addColorStop(1, 'rgba(13,240,194,0)');
            ctx.strokeStyle = grad;
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(tx, ty);
            ctx.stroke();

            // Bright head
            ctx.beginPath();
            ctx.fillStyle = `rgba(255,245,230,${fade})`;
            ctx.arc(s.x, s.y, 1.6, 0, Math.PI * 2);
            ctx.fill();

            if (s.life > s.maxLife || s.x < -50 || s.y > h + 50) {
              shootingStars.splice(i, 1);
            }
          }
        }

        requestAnimationFrame(tick);
      }

      window.addEventListener('resize', resize, { passive: true });
      resize();
      requestAnimationFrame(tick);
    })();
  </script>

    const hashType = (hashParams.get("type") || "").trim().toLowerCase();
    const isRecoveryMode = queryMode === "recovery" || hashType === "recovery";

    function setStatus(msg, type = "") {

    }

    function setBusy(on) {
      signInBtn.disabled = on;
      signUpBtn.disabled = on;

      forgotBtn.disabled = on;
    }

    const EMAIL_RE = /^[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,63}$/i;
    const BLOCKED_EMAIL_DOMAINS = new Set([
      "10minutemail.com",
      "20minutemail.com",
      "dispostable.com",
      "emailondeck.com",
      "example.com",
      "example.net",
      "example.org",

      "getnada.com",
      "grr.la",
      "guerrillamail.biz",

      "guerrillamail.org",
      "maildrop.cc",
      "moakt.com",
      "sharklasers.com",
      "tempmailo.com",
      "trashmail.com",
      "invalid",
      "localhost",
      "mailinator.com",
      "guerrillamail.com",
      "guerrillamail.net",
      "10minutemail.com",
      "tempmail.com",
      "temp-mail.org",
      "yopmail.com"
    ]);
    const BLOCKED_EMAIL_DOMAIN_FRAGMENTS = [
      "10minutemail",
      "disposable",
      "fakeinbox",
      "guerrillamail",
      "maildrop",
      "mailinator",
      "tempmail",
      "temp-mail",
      "trashmail",
      "yopmail"
    ];
    const BLOCKED_SIGNUP_LOCAL_PARTS = new Set([
      "asdf",
      "example",
      "fake",
      "invalid",
      "no-reply",
      "none",
      "noreply",
      "null",
      "qwerty",
      "test"
    ]);
    const EMAIL_SEND_COOLDOWN_MS = 5 * 60 * 1000;

    function normalizeEmail(value) {
      return String(value || "").trim().toLowerCase();
    }

    function validateEmail(value, rejectDisposable = true) {
      const email = normalizeEmail(value);
      if (!email) return "Email is required.";
      if (email.length > 254 || !EMAIL_RE.test(email)) return "Enter a valid email address.";
      if ((email.match(/@/g) || []).length !== 1) return "Enter a valid email address.";

      const [localPart, domain = ""] = email.split("@");
      if (!localPart || !domain) return "Use a real email address.";
      if (localPart.length > 64 || localPart.startsWith(".") || localPart.endsWith(".") || localPart.includes("..")) {
        return "Enter a valid email address.";
      }

      const domainLabels = domain.split(".");
      if (domainLabels.length < 2 || domainLabels.some(part => !part || part.length > 63)) {
        return "Enter a valid email address.";
      }
      if (domainLabels.some(part => part.startsWith("-") || part.endsWith("-"))) {
        return "Enter a valid email address.";
      }
      if (/^\d+$/.test(domainLabels[domainLabels.length - 1])) {
        return "Enter a valid email address.";
      }

      const blockedDomain = BLOCKED_EMAIL_DOMAINS.has(domain) ||
        BLOCKED_EMAIL_DOMAIN_FRAGMENTS.some(fragment => domain.includes(fragment));
      if (rejectDisposable && BLOCKED_SIGNUP_LOCAL_PARTS.has(localPart)) return "Use a real email address.";
      if (rejectDisposable && blockedDomain) return "Use a real email address.";
      if (
        rejectDisposable &&
        (
          domain.endsWith(".example") ||
          domain.endsWith(".invalid") ||
          domain.endsWith(".localhost") ||
          domain.endsWith(".local") ||
          domain.endsWith(".test")
        )
      ) {
        return "Use a real email address.";
      }
      return "";
    }

    function requireValidEmail(value, rejectDisposable = true) {
      const message = validateEmail(value, rejectDisposable);
      if (message) throw new Error(message);
      return normalizeEmail(value);
    }

    function enforceEmailSendCooldown(action, email) {
      const key = `arvio:${action}:${normalizeEmail(email)}`;
      const last = Number(window.localStorage.getItem(key) || "0");
      const remaining = EMAIL_SEND_COOLDOWN_MS - (Date.now() - last);
      if (remaining > 0) {
        throw new Error(`Please wait ${Math.ceil(remaining / 1000)}s before requesting another email.`);
      }
      window.localStorage.setItem(key, String(Date.now()));
    }

    function applyRecoveryModeUi() {
      subtitleEl.textContent = "Set a new password for your account.";
      pairBox.style.display = "none";
      signInBtn.style.display = "none";
      signUpBtn.style.display = "none";
      forgotBtn.style.display = "none";
      savePassBtn.style.display = "block";
      emailEl.style.display = "none";
      document.querySelector('label[for="email"]').style.display = "none";
      passEl.placeholder = "New password (min 6 characters)";
      passEl.autocomplete = "new-password";
    }

    if (pairCode) {
      subtitleEl.textContent = "Sign in to pair your TV device.";
      pairBox.style.display = "flex";
      pairCodeEl.textContent = pairCode;
    }
    if (isRecoveryMode) applyRecoveryModeUi();

    async function approveTvIfNeeded() {
      if (!pairCode) return;
      const { data: { session }, error: sessionError } = await supabase.auth.getSession();
      if (sessionError) throw sessionError;
      if (!session?.access_token || !session?.refresh_token) {
        throw new Error("No active session for TV pairing.");
      }

      const resp = await fetch(`${SUPABASE_URL}/functions/v1/tv-auth-approve`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ code: pairCode, refresh_token: session.refresh_token }),
      });

      const json = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(json.error || "TV pairing failed");
    }

    async function approveTvViaServer(email, password) {
      if (!pairCode) return;
      const normalizedEmail = requireValidEmail(email, false);
      const resp = await fetch(`${SUPABASE_URL}/functions/v1/tv-auth-web`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "signin",
          code: pairCode,
          email: normalizedEmail,
          password
        })
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(json.error || "TV pairing failed");
    }

    async function signUpAndPairViaServer(email, password) {
      if (!pairCode) return;
      const normalizedEmail = requireValidEmail(email);
      enforceEmailSendCooldown("signup", normalizedEmail);
      const resp = await fetch(`${SUPABASE_URL}/functions/v1/tv-auth-complete`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify({
          code: pairCode,
          email: normalizedEmail,
          password,
          intent: "signup"
        })
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(json.error || "Account creation or TV pairing failed");
    }

    async function createAccountViaServer(email, password) {
      const normalizedEmail = requireValidEmail(email);
      enforceEmailSendCooldown("signup", normalizedEmail);
      const resp = await fetch(`${SUPABASE_URL}/functions/v1/cloud-auth-email`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify({
          email: normalizedEmail,
          password
        })
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(json.error || "Account creation failed");
      if (!json.access_token || !json.refresh_token) {
        throw new Error("Account created but sign-in response was incomplete.");
      }
      const { error } = await supabase.auth.setSession({
        access_token: json.access_token,
        refresh_token: json.refresh_token
      });
      if (error) throw error;
      return normalizedEmail;
    }

    async function signInEmail() {
      const email = requireValidEmail(emailEl.value, false);
      const password = passEl.value;
      if (!password) throw new Error("Password is required.");
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      return { email, password };
    }

    async function signUpEmail() {
      const email = requireValidEmail(emailEl.value);
      const password = passEl.value;
      if (!password) throw new Error("Password is required.");
      if (password.length < 6) throw new Error("Password must be at least 6 characters.");
      await createAccountViaServer(email, password);
    }

    async function sendPasswordReset() {
      const email = requireValidEmail(emailEl.value);
      enforceEmailSendCooldown("reset", email);
      const redirectTo = "https://auth.arvio.tv/?mode=recovery";
      const resp = await fetch(`${SUPABASE_URL}/functions/v1/cloud-auth-reset`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify({
          email,
          redirect_to: redirectTo
        })
      });
      const json = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(json.error || "Password reset failed");
    }

    async function saveNewPassword() {
      const password = passEl.value;
      if (!password || password.length < 6) throw new Error("Password must be at least 6 characters.");
      const { data: { session }, error: sessionError } = await supabase.auth.getSession();
      if (sessionError) throw sessionError;
      if (!session) throw new Error("Recovery link expired. Request a new password reset email.");
      const { error } = await supabase.auth.updateUser({ password });
      if (error) throw error;
    }

    signInBtn.onclick = async () => {
      try {
        setBusy(true);
        setStatus("Signing in...");
        const creds = await signInEmail();
        try {
          await approveTvIfNeeded();
        } catch (_pairErr) {
          await approveTvViaServer(creds.email, creds.password);
        }
        setStatus(pairCode ? "TV paired. Redirecting..." : "Signed in. Redirecting...", "ok");
        setTimeout(() => { window.location.href = "https://arvio.tv"; }, 900);
      } catch (err) {
        setStatus(err.message || String(err), "error");
      } finally {
        setBusy(false);
      }
    };

    signUpBtn.onclick = async () => {
      try {
        setBusy(true);
        const email = requireValidEmail(emailEl.value);
        const password = passEl.value;
        if (!password) throw new Error("Password is required.");
        if (password.length < 6) throw new Error("Password must be at least 6 characters.");

        if (pairCode) {
          setStatus("Creating account and pairing TV...");
          await signUpAndPairViaServer(email, password);
          setStatus("Account created and TV paired. Redirecting...", "ok");
          setTimeout(() => { window.location.href = "https://arvio.tv"; }, 1200);
          return;
        }

        setStatus("Creating account...");
        await signUpEmail();
        try {
          await approveTvIfNeeded();
        } catch (_pairErr) {
          await approveTvViaServer(email, password);
        }
        setStatus(pairCode ? "Account created and TV paired. Redirecting..." : "Account created. Redirecting...", "ok");
        setTimeout(() => { window.location.href = "https://arvio.tv"; }, 1200);
      } catch (err) {
        const msg = err.message || String(err);
        if (msg.toLowerCase().includes("email") && msg.toLowerCase().includes("confirm")) {
          setStatus("Account created. Check your email, then sign in.", "ok");
        } else {
          setStatus(msg, "error");
        }
      } finally {
        setBusy(false);
      }
    };

    forgotBtn.onclick = async () => {
      try {
        setBusy(true);
        setStatus("Sending reset email...");
        await sendPasswordReset();
        setStatus("Password reset email sent. Check your inbox.", "ok");
      } catch (err) {
        setStatus(err.message || String(err), "error");
      } finally {
        setBusy(false);
      }
    };

    savePassBtn.onclick = async () => {
      try {
        setBusy(true);
        setStatus("Saving new password...");
        await saveNewPassword();
        setStatus("Password updated. Redirecting to sign in...", "ok");
        setTimeout(() => { window.location.href = "https://auth.arvio.tv/"; }, 1200);
      } catch (err) {
        setStatus(err.message || String(err), "error");
      } finally {
        setBusy(false);
      }
    };

    // Keep first interaction explicit to avoid showing premature pairing errors.
  </script>
</body>
</html>
