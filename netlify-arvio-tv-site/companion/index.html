<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARVIO Companion</title>
  <meta name="description" content="Manage your ARVIO account — profiles, add-ons, AI subtitles">
  <link rel="icon" href="../assets/arvio-icon-512.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background effects (same as arvio.tv) -->
  <div class="bg-fx"></div>
  <div class="bg-mesh"></div>
  <div class="bg-grain"></div>

  <!-- Auth Screen -->
  <div id="auth-screen" style="display:none">
    <img src="../assets/arvio-icon-512.png" class="auth-logo" onerror="this.style.display='none'" alt="ARVIO">
    <div class="auth-title">ARVIO Companion</div>
    <div class="auth-sub">Manage your ARVIO account — profiles, add-ons &amp; AI subtitles</div>
    <div class="auth-form">
      <input id="auth-email" type="email" class="auth-input" placeholder="Email" autocomplete="email"
        onkeydown="if(event.key==='Enter')document.getElementById('auth-password').focus()">
      <input id="auth-password" type="password" class="auth-input" placeholder="Password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')signIn()">
      <button id="auth-btn-signin" class="btn-primary" onclick="signIn()">Sign In</button>
      <button id="auth-btn-signup" class="btn-secondary" onclick="signUp()">Create Account</button>
      <div id="auth-status" style="font-size:13px;text-align:center;min-height:18px"></div>
    </div>
  </div>

  <!-- App Screen -->
  <div id="app-screen" style="display:none"></div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
