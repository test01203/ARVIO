<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARVIO Companion</title>
  <meta name="description" content="Manage your ARVIO account — profiles, add-ons, history, AI subtitles">
  <link rel="icon" href="../assets/arvio-icon-512.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Auth Screen -->
  <div id="auth-screen" style="display:none">
    <img src="../assets/arvio-icon-512.png" class="auth-logo" onerror="this.style.display='none'" alt="ARVIO">
    <div class="auth-title">ARVIO Companion</div>
    <div class="auth-sub">Manage your ARVIO account — profiles, add-ons, history &amp; AI subtitles</div>
    <div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px">
      <input id="auth-email-input" type="email" placeholder="your@email.com"
        style="width:100%;padding:14px 16px;border:1px solid #333;border-radius:10px;background:#1a1a1a;color:#fff;font-size:16px;box-sizing:border-box;outline:none"
        onfocus="this.style.borderColor='#F5C442'" onblur="this.style.borderColor='#333'"
        onkeydown="if(event.key==='Enter')sendMagicLink()">
      <button onclick="sendMagicLink()"
        style="width:100%;padding:14px;background:#F5C442;color:#000;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer">
        ✉️ Send Magic Link
      </button>
      <div id="auth-status" style="font-size:14px;text-align:center;color:#aaa;min-height:20px"></div>
    </div>
  </div>

  <!-- App Screen -->
  <div id="app-screen" style="display:none"></div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
